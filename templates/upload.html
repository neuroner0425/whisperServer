<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STT 서비스</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="page-shell">
<div class="container">
    <div class="topbar">
        <h2>음성/영상 파일 업로드(STT)</h2>
        <div class="profile-menu">
            <button type="button" class="profile-button">{{.CurrentUserName}}</button>
            <div class="profile-dropdown">
                <form method="post" action="/logout">
                    <button type="submit">로그아웃</button>
                </form>
            </div>
        </div>
    </div>

    <div class="page-actions">
        <a href="/" class="action-link">작업 목록으로</a>
        <a href="/tags" class="action-link">태그 관리</a>
    </div>

    <form id="uploadForm" name="uploadForm" method="post" action="/upload" enctype="multipart/form-data" class="form-column">
        <input type="file" name="file" accept="audio/*,video/*,audio/mp4,audio/x-m4a" required>
        <input type="text" name="input_name" placeholder="저장할 파일명 (선택)">
        <select name="folder_id">
            <option value="">루트</option>
            {{range .Folders}}
            <option value="{{.ID}}">{{.Name}}</option>
            {{end}}
        </select>
        <textarea name="description" rows="5" placeholder="영상/오디오에 대한 설명을 입력하면 정제에 반영됩니다 (선택)"></textarea>
        <select name="tags" multiple size="6">
            {{range .Tags}}
            <option value="{{.Name}}">{{.Name}}</option>
            {{end}}
        </select>
        <div style="width:100%;font-size:0.92em;color:#6b7280;">태그 선택(다중 선택 가능): macOS는 Command(⌘), Windows는 Ctrl 키를 누른 채 선택</div>
        <label style="display:flex;align-items:center;gap:8px;width:100%;justify-content:flex-start;">
            <input type="checkbox" name="refine_enabled" value="on">
            <span>업로드 후 자동 정제 사용</span>
        </label>
        <input type="submit" value="업로드" class="full-width">
    </form>
    <div style="margin-top:8px;color:#6b7280;">태그 추가/수정/삭제는 <a href="/tags">태그 관리</a>에서 할 수 있습니다.</div>
    <div style="color:#888; font-size:0.98em; margin-top:10px;">파일명을 입력하지 않으면 원본 파일명으로 저장됩니다.</div>
    <div id="uploadStatus" style="display:none; margin-top:24px; text-align:center;">
        <span style="font-size:1.1em; color:#2563eb; font-weight:bold;">업로드중입니다.</span>
        <div style="width:100%;background:#eee;border-radius:8px;margin-top:12px;">
            <div id="progressBar" style="height:18px;width:0%;background:#2563eb;border-radius:8px;"></div>
        </div>
        <span id="progressText" style="font-size:0.98em;color:#444;"></span>
    </div>
</div>
</div>
<script>
const form = document.getElementById('uploadForm');
const statusDiv = document.getElementById('uploadStatus');
const progressBar = document.getElementById('progressBar');
const progressText = document.getElementById('progressText');
let shownPercent = 0;
let playbackRunning = false;
let uploadDone = false;
let pendingRedirectURL = '';
const snapshots = [];

function renderUploadPercent(p) {
    const clamped = Math.max(0, Math.min(100, Math.round(p)));
    shownPercent = clamped;
    progressBar.style.width = clamped + '%';
    progressText.textContent = clamped + '%';
}

function maybeRedirectAfterPlayback() {
    if (!uploadDone) return;
    if (playbackRunning) return;
    if (snapshots.length >= 2) return;
    if (pendingRedirectURL) {
        window.location.href = pendingRedirectURL;
    }
}

function runPlaybackIfPossible() {
    if (playbackRunning || snapshots.length < 2) {
        maybeRedirectAfterPlayback();
        return;
    }

    playbackRunning = true;
    const from = snapshots[0];
    const to = snapshots[1];
    const duration = Math.max(120, to.at - from.at);
    const startedAt = performance.now();

    const tick = () => {
        const elapsed = performance.now() - startedAt;
        const ratio = Math.max(0, Math.min(1, elapsed / duration));
        const p = from.percent + ((to.percent - from.percent) * ratio);
        renderUploadPercent(p);
        if (ratio < 1) {
            setTimeout(tick, 33);
            return;
        }
        renderUploadPercent(to.percent);
        snapshots.shift();
        playbackRunning = false;
        runPlaybackIfPossible();
    };
    tick();
}

function pushSnapshot(percent) {
    const clamped = Math.max(0, Math.min(100, Math.round(percent)));
    const s = { at: Date.now(), percent: clamped };
    const last = snapshots[snapshots.length - 1];
    if (last && last.percent === s.percent) return;
    snapshots.push(s);
    runPlaybackIfPossible();
}

form.addEventListener('submit', function(e) {
    e.preventDefault();
    statusDiv.style.display = 'block';
    uploadDone = false;
    pendingRedirectURL = '';
    playbackRunning = false;
    snapshots.length = 0;
    renderUploadPercent(0);
    // First snapshot is buffered and not immediately animated.
    snapshots.push({ at: Date.now(), percent: 0 });

    const formData = new FormData(form);
    const xhr = new XMLHttpRequest();
    xhr.open('POST', form.action || window.location.pathname, true);
    xhr.upload.onprogress = function(e) {
        if (e.lengthComputable) {
            const rawPercent = Math.round((e.loaded / e.total) * 100);
            pushSnapshot(Math.min(98, rawPercent));
        }
    };
    xhr.onload = function() {
        if (xhr.status === 200 || xhr.status === 302 || xhr.status === 303) {
            uploadDone = true;
            pendingRedirectURL = xhr.responseURL;
            pushSnapshot(100);
            maybeRedirectAfterPlayback();
        } else {
            uploadDone = true;
            progressText.textContent = '업로드 실패';
            progressBar.style.background = '#ef4444';
        }
    };
    xhr.onerror = function() {
        uploadDone = true;
        progressText.textContent = '업로드 오류';
        progressBar.style.background = '#ef4444';
    };
    xhr.send(formData);
});
</script>
</body>
</html>
