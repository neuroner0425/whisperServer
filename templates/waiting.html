<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STT 서비스</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="page-shell">
<div class="container">
    <div class="topbar">
        <h2>작업 대기/진행 중</h2>
        <div class="profile-menu">
            <button type="button" class="profile-button">{{.CurrentUserName}}</button>
            <div class="profile-dropdown">
                <form method="post" action="/logout">
                    <button type="submit">로그아웃</button>
                </form>
            </div>
        </div>
    </div>

    <div class="page-actions">
        <a href="/" class="action-link">작업 목록으로</a>
        <a href="/upload" class="action-link">새 업로드</a>
    </div>

    <div class="info">파일명: {{.Job.Filename}}</div>
    <div class="info">미디어 길이: {{.Job.MediaDuration}}</div>
    <div class="info">업로드: {{.Job.UploadedAt}}</div>
    <div class="info">작업 시작: {{.Job.StartedAt}}</div>
    <div class="status">상태: {{.Job.Status}}</div>
    <div class="loader"></div>
    <div style="margin-top:12px;">
        <div style="font-size:0.95em;color:#444;">{{.Job.Phase}} {{.Job.ProgressPercent}}%</div>
        <div style="width:100%;background:#eee;border-radius:8px;overflow:hidden;height:12px;">
            <div style="height:12px;background:#2563eb;width:{{.Job.ProgressPercent}}%;"></div>
        </div>
    </div>
    <div style="margin-top:20px;padding:10px;border:1px solid #ddd;border-radius:8px;background:#f9f9f9;">
        <h3 style="margin:0 0 10px 0;color:#666;">실시간 전사 미리보기</h3>
        <div id="live-preview" class="result-text" style="max-height:320px;overflow-y:auto;"></div>
    </div>
    <div style="color:#888; font-size:0.98em;">상태가 자동으로 업데이트됩니다.</div>
</div>
</div>

<script>
(function(){
    const statusEl = document.querySelector('.status');
    const progressLabel = document.querySelector('[style*="font-size:0.95em"]');
    const progressBar = document.querySelector('[style*="background:#2563eb"]');
    const livePreviewEl = document.getElementById('live-preview');
    const initialRawPreview = {{printf "%q" .Job.PreviewText}};
    const pathParts = window.location.pathname.split('/');
    const jobId = pathParts[pathParts.length - 1];

    let isPolling = true;
    let shownProgress = {{.Job.ProgressPercent}};
    let shownPreview = '';
    let currentPhase = '{{.Job.Phase}}';
    let pendingRedirect = false;
    let playbackRunning = false;
    const snapshots = [];

    function stripTimeline(line) {
        let out = line.replace(/^\s*\[\d{2}:\d{2}:\d{2}(?:\.\d+)?\s*-->\s*\d{2}:\d{2}:\d{2}(?:\.\d+)?\]\s*/, '');
        // Fallback: remove any leading bracketed timeline-like token.
        out = out.replace(/^\s*\[[^\]]+\]\s*/, '');
        return out.trim();
    }

    function toDisplayPreview(raw) {
        if (!raw) return '';
        const trimmedRaw = String(raw).trim();
        if (trimmedRaw === '""' || trimmedRaw === "''") return '';
        return raw
            .split('\n')
            .map(stripTimeline)
            .filter(line => line && line !== '""' && line !== "''")
            .join('\n');
    }

    function clampPercent(v) {
        return Math.max(0, Math.min(100, v || 0));
    }

    function renderState(phase, progress, preview) {
        currentPhase = phase || currentPhase || '대기 중';
        shownProgress = clampPercent(progress);
        shownPreview = preview || '';
        if (progressLabel) {
            progressLabel.textContent = `${currentPhase} ${shownProgress}%`;
        }
        if (progressBar) {
            progressBar.style.width = `${shownProgress}%`;
        }
        if (livePreviewEl) {
            livePreviewEl.textContent = shownPreview;
            livePreviewEl.scrollTop = livePreviewEl.scrollHeight;
        }
    }

    function maybeRedirect() {
        if (!pendingRedirect) return;
        if (playbackRunning) return;
        if (snapshots.length >= 2) return;
        window.location.href = `/job/${jobId}`;
    }

    function runPlaybackIfPossible() {
        if (playbackRunning || snapshots.length < 2) {
            maybeRedirect();
            return;
        }
        playbackRunning = true;
        const from = snapshots[0];
        const to = snapshots[1];
        const duration = Math.max(600, to.at - from.at); // follow snapshot interval, but avoid instant jump
        const startedAt = performance.now();

        const tick = () => {
            if (!isPolling) {
                playbackRunning = false;
                return;
            }
            const elapsed = performance.now() - startedAt;
            const ratio = Math.max(0, Math.min(1, elapsed / duration));

            const progress = Math.round(from.progress + ((to.progress - from.progress) * ratio));
            const fromLen = from.preview.length;
            const toLen = to.preview.length;
            const currentLen = Math.round(fromLen + ((toLen - fromLen) * ratio));
            const preview = to.preview.slice(0, Math.max(0, currentLen));
            renderState(to.phase, progress, preview);

            if (ratio < 1) {
                setTimeout(tick, 40);
                return;
            }

            renderState(to.phase, to.progress, to.preview);
            snapshots.shift(); // consume 'from'
            playbackRunning = false;
            runPlaybackIfPossible();
        };
        tick();
    }

    function pushSnapshot(data) {
        const s = {
            at: Date.now(),
            phase: data.phase || '대기 중',
            progress: clampPercent(data.progress_percent),
            preview: toDisplayPreview(data.preview_text || ''),
        };
        const last = snapshots[snapshots.length - 1];
        if (last &&
            last.phase === s.phase &&
            last.progress === s.progress &&
            last.preview === s.preview) {
            return;
        }
        snapshots.push(s);
        runPlaybackIfPossible();
    }

    function checkStatus() {
        if (!isPolling) return;

        fetch(`/status/${jobId}`)
            .then(response => response.json())
            .then(data => {
                if (!isPolling) return;
                statusEl.textContent = `상태: ${data.status}`;
                pushSnapshot(data);

                if (data.status === '정제 대기 중' || data.status === '정제 중' || data.status === '완료') {
                    pendingRedirect = true;
                    maybeRedirect();
                } else {
                    setTimeout(checkStatus, 3000);
                }
            })
            .catch(() => {
                if (isPolling) {
                    setTimeout(checkStatus, 5000);
                }
            });
    }

    // Initial state becomes the first buffered snapshot (not immediately animated).
    snapshots.push({
        at: Date.now(),
        phase: currentPhase || '대기 중',
        progress: clampPercent(shownProgress),
        preview: toDisplayPreview(initialRawPreview || ''),
    });
    renderState(currentPhase, shownProgress, toDisplayPreview(initialRawPreview || ''));
    setTimeout(checkStatus, 3000);
    window.addEventListener('beforeunload', function() {
        isPolling = false;
    });
})();
</script>
</body>
</html>
