{{define "page_title"}}회원가입{{end}}
{{define "page_head_extra"}}{{end}}
{{define "page_body_attrs"}} class="auth-page"{{end}}
{{define "page_body"}}
<div class="page-shell">
<div class="container">
    <h2>회원가입</h2>
    {{if .Error}}
    <div style="color:#b91c1c;background:#fee2e2;border:1px solid #fecaca;padding:10px;border-radius:8px;margin-bottom:12px;">{{.Error}}</div>
    {{end}}
    <form method="post" action="/signup" class="form-column">
        <input type="text" name="login_id" placeholder="아이디 (3자 이상)" required>
        <input type="email" name="email" placeholder="이메일" required>
        <input type="password" name="password" placeholder="비밀번호 (8자 이상)" required>
        <input type="submit" value="회원가입" class="full-width">
    </form>
    <div style="text-align:center;margin-top:14px;">
        <a href="/login">로그인으로 돌아가기</a>
    </div>
</div>
</div>
{{end}}
{{define "page_scripts"}}{{end}}
