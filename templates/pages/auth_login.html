{{define "page_title"}}로그인{{end}}
{{define "page_head_extra"}}{{end}}
{{define "page_body_attrs"}} class="auth-page"{{end}}
{{define "page_body"}}
<div class="page-shell">
<div class="container">
    <h2>로그인</h2>
    {{if .Error}}
    <div style="color:#b91c1c;background:#fee2e2;border:1px solid #fecaca;padding:10px;border-radius:8px;margin-bottom:12px;">{{.Error}}</div>
    {{end}}
    <form method="post" action="/login" class="form-column">
        <input type="text" name="identifier" placeholder="아이디 또는 이메일" required>
        <input type="password" name="password" placeholder="비밀번호" required>
        <input type="submit" value="로그인" class="full-width">
    </form>
    <div style="text-align:center;margin-top:14px;">
        <a href="/signup">회원가입</a>
    </div>
</div>
</div>
{{end}}
{{define "page_scripts"}}{{end}}
