<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STT 서비스</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="page-shell">
<div class="container">
    <div class="topbar">
        <h2>정제 전 미리보기</h2>
        <div class="profile-menu">
            <button type="button" class="profile-button">{{.CurrentUserName}}</button>
            <div class="profile-dropdown">
                <form method="post" action="/logout">
                    <button type="submit">로그아웃</button>
                </form>
            </div>
        </div>
    </div>

    <div class="page-actions">
        <a href="/" class="action-link">작업 목록으로</a>
        <a href="/upload" class="action-link">새 업로드</a>
    </div>

    <div class="info">파일명: {{.Job.Filename}}</div>
    <div class="info">미디어 길이: {{.Job.MediaDuration}}</div>
    <div class="info">업로드: {{.Job.UploadedAt}}</div>
    <div class="info">작업 시작: {{.Job.StartedAt}}</div>
    <div class="info">작업 완료: {{.Job.CompletedAt}}</div>
    <div class="status">상태: <span id="status">{{.Job.Status}}</span></div>

    <div class="loader" id="loader"></div>
    <div style="margin-top:12px;" id="progress-container">
        <div style="font-size:0.95em;color:#444;" id="progress-label">{{.Job.Phase}} {{.Job.ProgressPercent}}%</div>
        <div style="width:100%;background:#eee;border-radius:8px;overflow:hidden;height:12px;">
            <div style="height:12px;background:#2563eb;width:{{.Job.ProgressPercent}}%;"></div>
        </div>
    </div>

    <div style="margin-top:20px;padding:10px;border:1px solid #ddd;border-radius:8px;background:#f9f9f9;">
        <h3 style="margin:0 0 10px 0;color:#666;">원본 전사 결과</h3>
        <div class="result-text" style="max-height:400px;overflow-y:auto;">{{.OriginalTextHTML}}</div>
    </div>

    <div style="color:#888; font-size:0.98em;margin-top:12px;">정제가 완료되면 자동으로 최종 결과 페이지로 이동합니다.</div>
</div>
</div>

<script>
(function(){
    const jobId = '{{.JobID}}';
    const statusEl = document.getElementById('status');
    const loaderEl = document.getElementById('loader');
    const progressContainer = document.getElementById('progress-container');
    const progressLabel = document.getElementById('progress-label');

    let isPolling = true;

    function checkStatus() {
        if (!isPolling) return;

        fetch(`/status/${jobId}`)
            .then(response => response.json())
            .then(data => {
                if (!isPolling) return;
                statusEl.textContent = data.status;

                if (data.status === '완료') {
                    isPolling = false;
                    loaderEl.style.display = 'none';
                    progressContainer.style.display = 'none';
                    window.location.href = `/job/${jobId}`;
                } else {
                    progressLabel.textContent = `${data.phase || '정제 중'} ${data.progress_percent || 0}%`;
                    setTimeout(checkStatus, 3000);
                }
            })
            .catch(() => {
                if (isPolling) {
                    setTimeout(checkStatus, 5000);
                }
            });
    }

    setTimeout(checkStatus, 3000);
    window.addEventListener('beforeunload', function() {
        isPolling = false;
    });
})();
</script>
</body>
</html>
