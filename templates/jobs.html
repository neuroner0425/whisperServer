<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STT 서비스</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="page-shell">
<div class="container" style="padding-bottom:72px;">
    <div class="topbar">
        <h2>작업 목록</h2>
        <div class="profile-menu">
            <button type="button" class="profile-button">{{.CurrentUserName}}</button>
            <div class="profile-dropdown">
                <form method="post" action="/logout">
                    <button type="submit">로그아웃</button>
                </form>
            </div>
        </div>
    </div>

    <div class="page-actions">
        <a href="/upload" class="action-link">새 업로드</a>
    </div>

    <div style="margin-bottom: 1rem;">
        <form id="searchForm" action="/" method="get">
            <input id="searchQuery" type="text" name="q" placeholder="파일명으로 검색..." value="{{.SearchQuery}}" class="search-input-field" style="flex-grow: 1;">
            <input type="hidden" id="searchPage" name="page" value="{{.Page}}">
            <input type="submit" value="검색" class="search-button">
        </form>
    </div>

    <form id="batch_form" method="post" class="form-column">
        <table>
            <thead>
            <tr>
                <th><input type="checkbox" id="select-all"></th>
                <th>파일명</th>
                <th>미디어 길이</th>
                <th>상태</th>
                <th>결과</th>
            </tr>
            </thead>
            <tbody id="jobs-tbody">
            {{range .JobItems}}
            <tr>
                <td><input type="checkbox" name="job_ids" value="{{.ID}}"></td>
                <td>{{.Filename}}</td>
                <td>{{.MediaDuration}}</td>
                <td class="status">{{.Status}}{{if .IsRefined}} (정제됨){{end}}</td>
                <td><a href="/job/{{.ID}}">보기</a></td>
            </tr>
            {{end}}
            </tbody>
        </table>
        <div id="empty-jobs" style="text-align:center; color:#aaa; margin-top:24px; {{if gt (len .JobItems) 0}}display:none;{{end}}">작업 내역이 없습니다.</div>

        <div id="batch-actions" style="margin-top: 1rem; display: none; justify-content: center; gap: 1rem; width: 100%;">
            <div style="width: 66.67%;">
                <input id="batch-download-btn" type="submit" value="선택 항목 일괄 다운로드" class="full-width" formaction="/batch-download">
            </div>
            <div style="width: 33.33%;">
                <button id="batch-delete-btn" type="button" class="full-width btn-danger" onclick="confirmDelete()">선택 항목 일괄 삭제</button>
            </div>
        </div>
    </form>

    <div id="pagination" class="pagination"></div>
</div>
</div>
<script>
const form = document.getElementById('batch_form');
const selectAll = document.getElementById('select-all');
const actions = document.getElementById('batch-actions');
const tbody = document.getElementById('jobs-tbody');
const searchQueryInput = document.getElementById('searchQuery');
const searchPageInput = document.getElementById('searchPage');
const emptyJobs = document.getElementById('empty-jobs');
const pagination = document.getElementById('pagination');

let currentPage = {{.Page}};
const pageSize = {{.PageSize}};
let totalPages = {{.TotalPages}};

function selectedIds() {
    return Array.from(document.querySelectorAll('input[name="job_ids"]:checked')).map(el => el.value);
}

function updateBatchActions() {
    const checkedCount = selectedIds().length;
    actions.style.display = checkedCount > 0 ? 'flex' : 'none';
}

function bindCheckboxEvents() {
    const checkboxes = document.querySelectorAll('input[name="job_ids"]');
    checkboxes.forEach((checkbox) => {
        checkbox.addEventListener('change', updateBatchActions);
    });
}

function renderPagination() {
    pagination.innerHTML = '';
    if (totalPages <= 1) return;

    const makeBtn = (label, page, disabled=false, active=false) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.textContent = label;
        btn.className = 'page-btn' + (active ? ' active' : '');
        if (disabled) btn.disabled = true;
        btn.addEventListener('click', () => {
            if (page === currentPage || disabled) return;
            currentPage = page;
            searchPageInput.value = currentPage;
            pollJobs(true);
        });
        return btn;
    };

    pagination.appendChild(makeBtn('이전', Math.max(1, currentPage - 1), currentPage === 1));

    const start = Math.max(1, currentPage - 2);
    const end = Math.min(totalPages, start + 4);
    for (let p = start; p <= end; p++) {
        pagination.appendChild(makeBtn(String(p), p, false, p === currentPage));
    }

    pagination.appendChild(makeBtn('다음', Math.min(totalPages, currentPage + 1), currentPage === totalPages));
}

selectAll.addEventListener('change', function(e) {
    const checkboxes = document.querySelectorAll('input[name="job_ids"]');
    checkboxes.forEach(checkbox => {
        checkbox.checked = e.target.checked;
    });
    updateBatchActions();
});

function renderRows(items) {
    const selected = new Set(selectedIds());
    tbody.innerHTML = '';

    if (!items || items.length === 0) {
        emptyJobs.style.display = 'block';
        selectAll.checked = false;
        updateBatchActions();
        return;
    }

    emptyJobs.style.display = 'none';

    items.forEach(item => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><input type="checkbox" name="job_ids" value="${item.ID}"></td>
            <td>${item.Filename}</td>
            <td>${item.MediaDuration}</td>
            <td class="status">${item.Status}${item.IsRefined ? ' (정제됨)' : ''}</td>
            <td><a href="/job/${item.ID}">보기</a></td>
        `;
        const cb = tr.querySelector('input[name="job_ids"]');
        if (selected.has(item.ID)) cb.checked = true;
        tbody.appendChild(tr);
    });

    bindCheckboxEvents();
    updateBatchActions();
}

function pollJobs(pushUrl=false) {
    const q = encodeURIComponent(searchQueryInput.value || '');
    fetch(`/jobs/updates?q=${q}&page=${currentPage}&page_size=${pageSize}`, { credentials: 'same-origin' })
        .then(r => r.ok ? r.json() : null)
        .then(data => {
            if (!data) return;
            currentPage = data.page || currentPage;
            totalPages = data.total_pages || 1;
            searchPageInput.value = currentPage;
            renderRows(data.job_items || []);
            renderPagination();
            if (pushUrl) {
                const params = new URLSearchParams();
                if (searchQueryInput.value) params.set('q', searchQueryInput.value);
                params.set('page', currentPage);
                history.replaceState(null, '', `/?${params.toString()}`);
            }
        })
        .catch(() => {});
}

function confirmDelete() {
    const checkedCount = selectedIds().length;
    if (checkedCount === 0) return false;

    const confirmationText = "Delete Select Files";
    const userInput = prompt(`정말로 삭제하시겠습니까?\n삭제를 원하시면 "${confirmationText}"를 입력하세요.`);
    if (userInput === null) return false;

    const normalizedUserInput = userInput.toLowerCase().replace(/\s/g, '');
    const normalizedConfirmationText = confirmationText.toLowerCase().replace(/\s/g, '');

    if (normalizedUserInput === normalizedConfirmationText) {
        form.action = "/batch-delete";
        form.submit();
        return true;
    }
    alert("입력 내용이 일치하지 않아 삭제가 취소되었습니다.");
    return false;
}

bindCheckboxEvents();
updateBatchActions();
renderPagination();
setInterval(() => pollJobs(false), 3000);
</script>
</body>
</html>
